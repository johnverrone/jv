name: Deploy johnverrone

on:
  push:
    branches: [main]
    paths:
      - "johnverrone/**"
      - "rustgame/**"
      - ".github/workflows/deploy-johnverrone.yml"
  pull_request:
    paths:
      - "johnverrone/**"
      - "rustgame/**"
      - ".github/workflows/deploy-johnverrone.yml"

concurrency:
  group: deploy-johnverrone-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  WASM_BINDGEN_VERSION: "0.2.121"

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Secrets aren't available to forked PRs; skip those.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache rustgame/pkg
        id: cache-pkg
        uses: actions/cache@v4
        with:
          path: rustgame/pkg
          key: ${{ runner.os }}-rustgame-pkg-${{ env.WASM_BINDGEN_VERSION }}-${{ hashFiles('rustgame/src/**', 'rustgame/Cargo.lock', 'rustgame/Cargo.toml', 'rustgame/build-wasm.sh', 'rustgame/data/**') }}

      - name: Install Rust toolchain
        if: steps.cache-pkg.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        if: steps.cache-pkg.outputs.cache-hit != 'true'
        with:
          workspaces: rustgame -> target

      - uses: cargo-bins/cargo-binstall@main
        if: steps.cache-pkg.outputs.cache-hit != 'true'

      - name: Install wasm-bindgen-cli
        if: steps.cache-pkg.outputs.cache-hit != 'true'
        run: cargo binstall -y --force wasm-bindgen-cli@${{ env.WASM_BINDGEN_VERSION }}

      - uses: oven-sh/setup-bun@v2

      - name: Build WASM
        if: steps.cache-pkg.outputs.cache-hit != 'true'
        working-directory: rustgame
        run: ./build-wasm.sh --release

      - name: Report wasm size
        run: |
          echo "cache-hit: ${{ steps.cache-pkg.outputs.cache-hit }}"
          if [ -d rustgame/pkg ]; then
            ls -lh rustgame/pkg
            if [ -f rustgame/pkg/rustgame_bg.wasm ]; then
              bytes=$(stat -c%s rustgame/pkg/rustgame_bg.wasm)
              echo "rustgame_bg.wasm: ${bytes} bytes ($((bytes/1048576)) MB)"
            fi
          else
            echo "no rustgame/pkg dir"
          fi

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Set deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
            echo "flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "env=preview" >> "$GITHUB_OUTPUT"
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.target.outputs.env }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        working-directory: johnverrone
        run: bun install --frozen-lockfile

      - name: Build
        run: vercel build ${{ steps.target.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Inspect deploy artifact (.vercel/output)
        run: |
          # `vercel build` writes .vercel/output next to the linked .vercel dir.
          # In CI the project is linked at the repo root; locally it lives in johnverrone/.
          OUT=""
          for d in .vercel/output johnverrone/.vercel/output; do
            [ -d "$d" ] && OUT="$d" && break
          done
          if [ -z "$OUT" ]; then
            echo "::error::no .vercel/output found"; ls -la; exit 0
          fi
          echo "Found deploy artifact at: $OUT"
          echo "::group::Total size"
          du -sh "$OUT"
          echo "::endgroup::"
          echo "::group::Top 30 largest files"
          find "$OUT" -type f -printf '%s\t%p\n' | sort -rn | head -30 \
            | awk -F'\t' '{ s=$1; u="B"; if(s>=1048576){s/=1048576;u="MB"} else if(s>=1024){s/=1024;u="KB"}; printf "%10.1f %-3s %s\n", s, u, $2 }'
          echo "::endgroup::"
          echo "Files over 100MB:"
          big=$(find "$OUT" -type f -size +100M -printf '%s\t%p\n' | sort -rn)
          if [ -n "$big" ]; then
            echo "$big" | awk -F'\t' '{ printf "::error::OVER 100MB: %.1f MB  %s\n", $1/1048576, $2 }'
          else
            echo "  none ✅"
          fi

      - name: Deploy (Vercel)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt ${{ steps.target.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: johnverrone-preview
          message: |
            **johnverrone preview:** ${{ steps.deploy.outputs.url }}
